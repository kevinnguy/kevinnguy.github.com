<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Ratchet template page</title>

    <!-- Sets initial viewport load and disables zooming  -->
    <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">

    <!-- Makes your prototype chrome-less once bookmarked to your phone's home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <link href="css/ratchet.min.css" rel="stylesheet">

    <script src="js/ratchet.min.js"></script>
    <script src="js/retina.min.js"></script>

    <style>
      .content {
        background-color: #3B2F63;
        background-image: radial-gradient( at 50% top, rgba(84,90,182,0.6) 0%,rgba(84,90,182,0) 75%),radial-gradient( at right top, #794aa2 0%,rgba(121,74,162,0) 57%);
        color: #c7c0de;
        background-repeat: no-repeat;
        color: #c7c0de;
        margin: 0;
        padding: 0;
      }
    </style>

  </head>
  <body>
    <!-- Wrap all non-bar HTML in the .content div (this is actually what scrolls) -->
    <div class="content">
      <!-- Note: For this slider example, you'll need some additional styles not included with Ratchet -->
      <style>

        .slider .slide img {
          display: block;
          width: 100%;
          height: 100%;
        }

        .slider .slide-group .slide-text {
          position: absolute;
          top: 45%;
          left: 0;
          width: 100%;
          font-size: 24px;
          color: #fff;
          text-align: center;
          text-shadow: 0 0 10px rgba(0,0,0,.5);
        }

        #mySlider {
          top: 50%;
          left: 50%;
          width: 320px;
          height: 460px;
          /*margin: auto auto;*/
          margin-top: -230px; /*set to a negative number 1/2 of your height*/
          margin-left: -160px; /*set to a negative number 1/2 of your width*/
          position: fixed;

          -webkit-border-radius: 4px;
          -moz-border-radius: 4px;
          border-radius: 4px;
        }

        #first-slide {
          -webkit-border-top-left-radius: 4px;
          -webkit-border-bottom-left-radius: 4px;
          -moz-border-radius-topleft: 4px;
          -moz-border-radius-bottomleft: 4px;
          border-top-left-radius: 4px;
          border-bottom-left-radius: 4px;
        }

        #last-slide {
          -webkit-border-top-right-radius: 4px;
          -webkit-border-bottom-right-radius: 4px;
          -moz-border-radius-topright: 4px;
          -moz-border-radius-bottomright: 4px;
          border-top-right-radius: 4px;
          border-bottom-right-radius: 4px;
        }

      </style>

      <div class="slider" id="mySlider">
        <div class="slide-group">
          <div class="slide" id="first-slide">
            <img src="img/kevin1.png">
<!--             <span class="slide-text">
              <span class="icon icon-left-nav"></span>
              Slide me
            </span> -->
          </div>
          <div class="slide" id="last-slide">
            <img src="img/kevin2.png">
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
