---
layout: default
blog: true
---

<ul class="twelve columns">
    <li id="posts">
      <a class="eight columns" href="{{ page.url }}">{{ page.title }}</a>
      <span class="three columns">{{ page.date | date: "%b %d, %Y" }}</span>
    </li>

    <article class="eleven columns" id="content">
      {{ content }}
    </article>
</ul>
