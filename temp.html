<ul id="posts" class="twelve columns">
  {% for post in site.posts %}
    <li class="post">
      <a class="eight columns" href="{{ post.url }}">{{ post.title }}</a>
      <span class="three columns">{{ post.date | date: "%b %d, %Y" }}</span>
    </li>
  {% endfor %}
</ul>
